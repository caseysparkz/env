---
- name: "Create ~/.vim"
  tags: ["vim"]
  ansible.builtin.file:
    src: "{{ vim_symlink_src_dir }}/files/vim/"
    dest: "{{ ansible_facts.env.HOME }}/.vim"
    state: "link"
    force: true

- name: "Symlink ~/.vimrc"
  tags: ["vim"]
  ansible.builtin.file:
    src: "{{ vim_symlink_src_dir }}/files/vim/vimrc"
    dest: "{{ ansible_facts.env.HOME }}/.vimrc"
    state: "link"
    force: true
