---
- name: "Set 'screen_symlink_src_dir'"
  ansible.builtin.set_fact:
    screen_symlink_src_dir: "{{ role_path | replace(collections_path, inventory_dir ~ '/collections') }}"

- name: "Install Gnu Screen"
  become: true
  when: "ansible_facts.os_family == 'Debian'"
  tags: ["screen"]
  ansible.builtin.apt:
    pkg: "screen"
    state: "present"
    update_cache: true
    cache_valid_time: 3600

- name: "Install ~/.screen/"
  tags: ["screen"]
  ansible.builtin.file:
    src: "{{ screen_symlink_src_dir }}/files/screen/"
    dest: "{{ ansible_facts.env.HOME }}/.screen"
    state: "link"
    force: true

- name: "Install ~/.screenrc"
  tags: ["screen"]
  ansible.builtin.file:
    src: "{{ ansible_facts.env.HOME }}/.screen/screenrc"
    dest: "{{ ansible_facts.env.HOME }}/.screenrc"
    state: "link"
    force: true
