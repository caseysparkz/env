---
- name: "Create ~/.ssh/"
  loop:
    - "{{ ansible_facts.env.HOME }}/.ssh/"
    - "{{ ansible_facts.env.HOME }}/.ssh/keys"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "directory"
    owner: "{{ ansible_facts.effective_user_id }}"
    group: "{{ ansible_facts.effective_group_id }}"
    mode: "0700"
