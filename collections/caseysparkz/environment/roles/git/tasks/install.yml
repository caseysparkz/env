---
- name: "Install git packages"
  become: true
  when: "ansible_facts.os_family == 'Debian'"
  ansible.builtin.apt:
    pkg: &packages
      - "gh"
      - "git"
    state: "present"
    update_cache: true
    cache_valid_time: 3600

- name: "Install git packages"
  become: true
  when: "ansible_facts.os_family == 'RedHat'"
  ansible.builtin.dnf:
    name: *packages
    state: "present"
    update_cache: true

- name: "Install git packages"
  become: false
  when: "ansible_facts.os_family == 'Darwin'"
  community.general.homebrew:
    name: *packages
    state: "present"
    update_homebrew: true
